# Proxy whitelist — add domains here to allow access.
#
# Each entry: [domains."<host>"]
#   methods = ["GET","POST","HEAD"]   # optional; default = ["GET","HEAD"]
#   dlp     = "none"                  # optional; omit to use default DLP scan
#
# Subdomain matching is automatic (e.g. "github.com" also allows "api.github.com").

# --- Anthropic (POST allowed) ---
[domains."anthropic.com"]
methods = ["GET", "POST", "HEAD"]

[domains."claude.ai"]
methods = ["GET", "POST", "HEAD"]

[domains."claude.com"]
methods = ["GET", "POST", "HEAD"]

